<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FeedCut</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<h1>Feed<span>Cut</span></h1>

</header>

<!-- =========================
     Durchmesser
========================= -->

<section class="diameter">

<label for="d">Ø</label>

<input
id="d"
type="text"
inputmode="decimal"
autocomplete="off">

<span>mm</span>

</section>

<!-- =========================
     Modus
========================= -->

<section class="feedmode">

<label>

<input
type="radio"
name="feedMode"
value="fz"
checked>

fz konstant

</label>

<label>

<input
type="radio"
name="feedMode"
value="vf">

Vf konstant

</label>

</section>

<!-- =========================
     Hauptbereich
========================= -->

<section class="main">

<div class="card rpm">

<div class="icon">

↻

</div>

<label for="vc">

Vc (m/min)

</label>

<input
id="vc"
type="text"
inputmode="decimal">

<label for="n">

n (1/min)

</label>

<input
id="n"
type="text"
inputmode="numeric">

</div>

<div class="card feed">

<div class="icon">

⇢≈

</div>

<label for="z">

z

</label>

<input
id="z"
type="text"
inputmode="numeric">

<label for="fz">

fz (mm)

</label>

<input
id="fz"
type="text"
inputmode="decimal">

<label for="vf">

Vf (mm/min)

</label>

<input
id="vf"
type="text"
inputmode="numeric">

</div>

</section>

<!-- =========================
     Bearbeitungszeit
========================= -->

<section class="time">

<div class="timefield weg">

<label for="weg">

Weg

</label>

<input
id="weg"
type="text"
inputmode="decimal">

</div>

<div class="timefield amount">

<label for="anzahl">

Wdh.

</label>

<input
id="anzahl"
type="text"
inputmode="numeric"
value="1">

</div>

<div class="timefield runtime">

<label for="zeit">

Zeit (s)

</label>

<input
id="zeit"
type="text"
readonly>

</div>

</section>

<!-- =========================
     Button
========================= -->

<section class="buttons">

<button id="clearBtn">

🗑 Alles löschen

</button>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
